<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Empire Clicker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .top {
      padding: 20px;
      font-size: 18px;
    }

    .btn {
      font-size: 42px;
      padding: 30px 60px;
      margin-top: 60px;
      border-radius: 20px;
      border: none;
      background: gold;
      cursor: pointer;
    }

    .title {
      font-size: 24px;
      margin-top: 20px;
      color: #ffd700;
    }
  </style>
</head>

<body>

  <div class="title">👑 Empire Clicker</div>

  <div class="top">
    💰 Money: <span id="money">0</span><br>
    📈 Level: <span id="level">1</span><br>
    ⚡ Energy: <span id="energy">50</span>
  </div>

  <button class="btn" onclick="tap()">🖱️ TAP</button>

  <script src="app.js"></script>

</body>
</html>
